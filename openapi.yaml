openapi: 3.0.3
info:
  title: TCSS 460 Group Project API
  description: |
    **Team:** Group 7
    **Deployed URL:** https://tcss-460-group-7.onrender.com

    A RESTful API for the TCSS 460 group project.
  version: 0.1.0

servers:
  - url: https://tcss-460-group-7.onrender.com
    description: Local development

tags:
  - name: General
    description: General-purpose routes
  - name: TV Search
    description: TMDB TV search proxy routes
  - name: Movie Search
    description: TMDB movie search proxy routes
  - name: Popular
    description: Popular movies and TV shows
  - name: Movies Details
    description: Movie related routes
  - name: TV Shows Details
    description: TV Show related routes
  - name: Ratings
    description: Authenticated user rating routes

paths:
  /status:
    get:
      tags: [General]
      summary: Check status
      description: Checks the status of the server to ensure nothing was broken
      responses:
        '200':
          description: Checks the client status
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Status: OK'

  /v1/tv/search/title:
    get:
      tags: [TV Search]
      summary: Search TV shows by title
      description: Searches TMDB for TV shows by title and returns key metadata with poster and backdrop image URLs.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: TV show title to search for.
          example: breaking bad
      responses:
        '200':
          description: TV search results returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TVSearchResponse'
        '400':
          description: Missing or invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        '500':
          description: TMDB API token is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/movie/search/title:
    get:
      tags: [Movie Search]
      summary: Search movies by title
      description: Searches TMDB for movies by title and returns key metadata with poster and backdrop image URLs.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Movie title to search for.
          example: inception
      responses:
        '200':
          description: Movie search results returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieSearchResponse'
        '400':
          description: Missing or invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        '401':
          description: TMDB request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        '500':
          description: TMDB API token is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tv/search/genre:
    get:
      tags: [TV Search]
      summary: Search TV shows by genre
      description: Discovers TMDB TV shows by genre and returns key metadata with poster and backdrop image URLs.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: TV genre name. Spaces are normalized to underscores.
          example: drama
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: TMDB result page number.
      responses:
        '200':
          description: TV genre search results returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TVSearchResponse'
        '400':
          description: Invalid genre or page parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        '404':
          description: Genre was not found in the local TV genre map
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        '500':
          description: TMDB API token is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tv/search/cast:
    get:
      tags: [TV Search]
      summary: Search TV shows by cast member
      description: Searches TMDB for a person, retrieves that person's TV credits, and optionally filters the credits by TV genre.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Cast member name.
          example: tom hanks
        - in: query
          name: genre
          required: false
          schema:
            type: string
          description: Optional TV genre name used to filter the cast member's TV credits.
          example: drama
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Local result page number for the cast member's TV credits.
      responses:
        '200':
          description: Cast TV credit results returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TVSearchResponse'
        '400':
          description: Invalid cast, genre, or page parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        '404':
          description: Cast member or genre was not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        '500':
          description: TMDB API token is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tv/popular:
    get:
      tags: [Popular]
      summary: Get popular TV shows
      description: Returns a paginated list of currently popular TV shows from TMDB with key metadata and poster URLs.
      parameters:
        - in: query
          name: language
          required: false
          schema:
            type: string
            default: en-US
          description: Language for the results (IETF BCP 47 tag).
          example: en-US
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number of results.
        - in: query
          name: include_adult
          required: false
          schema:
            type: boolean
            default: false
          description: Include adult content in results.
      responses:
        '200':
          description: Popular TV shows returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PopularTVResponse'
        '500':
          description: TMDB API token is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/movies/popular:
    get:
      tags: [Popular]
      summary: Get popular movies
      description: Returns a paginated list of currently popular movies from TMDB with key metadata and poster URLs.
      parameters:
        - in: query
          name: language
          required: false
          schema:
            type: string
            default: en-US
          description: Language for the results (IETF BCP 47 tag).
          example: en-US
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number of results.
        - in: query
          name: region
          required: false
          schema:
            type: string
          description: ISO 3166-1 country code to filter results by region.
          example: US
      responses:
        '200':
          description: Popular movies returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PopularMoviesResponse'
        '500':
          description: TMDB API token is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/movie/details:
    get:
      tags: [Movies Details]
      summary: Get movie details
      description: Fetches and transforms movie details from TMDB using a movie ID.
      parameters:
        - in: query
          name: Id
          required: true
          schema:
            type: integer
          description: The TMDB ID of the movie
      responses:
        '200':
          description: Successful response with transformed movie details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 550
                  title:
                    type: string
                    example: 'Fight Club'
                  genre:
                    type: string
                    example: 'Drama'
                  year:
                    type: string
                    example: '1999'
                  summary:
                    type: string
                    example: 'A ticking-time-bomb insomniac and a slippery soap salesman...'
                  poster_url:
                    type: string
                    nullable: true
                    example: 'https://image.tmdb.org/t/p/w500/pB8BM79JsS0Zv9Uv00pYI0mhaZ5.jpg'
                $ref: '#/components/schemas/MovieDetailsResponse'
        '404':
          description: Movie not found on TMDB
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_message:
                    type: string
                    example: 'The resource you requested could not be found.'
                $ref: '#/components/schemas/TMDBErrorResponse'
        '502':
          description: Failed to reach TMDB
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Failed to reach TMDB'
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tv/details:
    get:
      tags: [TV Shows Details]
      summary: Get TV show details
      description: Fetches and transforms TV show details from TMDB using a TV show ID.
      parameters:
        - in: query
          name: Id
          required: true
          schema:
            type: integer
          description: The TMDB ID of the TV show
      responses:
        '200':
          description: Successful response with transformed TV show details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 246
                  title:
                    type: string
                    example: 'Avatar: The Last Airbender'
                  genre:
                    type: string
                    example: 'Action & Adventure, Animation, Kids'
                  year:
                    type: string
                    example: '2005'
                  episodes:
                    type: integer
                    example: 61
                  seasons:
                    type: integer
                    example: 3
                  summary:
                    type: string
                    example: 'In a war-torn world of elemental magic, a young boy reawakens to undertake a dangerous mystic quest to fulfill his destiny as the Avatar, and bring peace to the world.'
                  poster_url:
                    type: string
                    nullable: true
                    example: 'https://image.tmdb.org/t/p/w500/cZ0d3rtvX5s1bUu3Wej2p3m2g2Y.jpg'
                $ref: '#/components/schemas/TVDetailsResponse'
        '404':
          description: TV show not found on TMDB
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_message:
                    type: string
                    example: 'The resource you requested could not be found.'
                $ref: '#/components/schemas/TMDBErrorResponse'
        '502':
          description: Failed to reach TMDB
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Failed to reach TMDB'
                $ref: '#/components/schemas/ErrorResponse'

  /v1/ratings/{title_id}:
    post:
      tags: [Ratings]
      summary: Create or replace the authenticated user's rating for a title
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: title_id
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingWriteRequest'
      responses:
        '201':
          description: Rating created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingResponse'
        '200':
          description: Existing rating updated instead of created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingResponse'
        '400':
          description: Invalid path or body input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error while creating or updating the rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Ratings]
      summary: Update the authenticated user's rating for a title
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: title_id
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingWriteRequest'
      responses:
        '200':
          description: Rating updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingResponse'
        '400':
          description: Invalid path or body input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Rating was not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error while updating the rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Ratings]
      summary: Delete the authenticated user's rating for a title
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: title_id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Rating deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingResponse'
        '400':
          description: Invalid path input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Rating was not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error while deleting the rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/ratings/title/{title_id}:
    get:
      tags: [Ratings]
      summary: Get all ratings for a title
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: title_id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Ratings returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingListResponse'
        '400':
          description: Invalid path input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No ratings were found for the title
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error while fetching title ratings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/ratings/user/{authorId}/title/{title_id}:
    get:
      tags: [Ratings]
      summary: Get one user's rating for one title
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: authorId
          required: true
          schema:
            type: integer
            minimum: 1
        - in: path
          name: title_id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: User rating returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingResponse'
        '400':
          description: Invalid path input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: The user has not rated the title
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error while fetching the rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/ratings/user/{authorId}:
    get:
      tags: [Ratings]
      summary: Get a paginated list of ratings by user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: authorId
          required: true
          schema:
            type: integer
            minimum: 1
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: User ratings returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRatingListResponse'
        '400':
          description: Invalid path or query input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error while fetching user ratings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    MovieDetailsResponse:
      type: object
      properties:
        id:
          type: integer
          example: 550
        title:
          type: string
          example: 'Fight Club'
        genre:
          type: string
          example: 'Drama'
        year:
          type: string
          example: '1999'
        summary:
          type: string
          example: 'A ticking-time-bomb insomniac and a slippery soap salesman...'
        poster_url:
          type: string
          nullable: true
          example: 'https://image.tmdb.org/t/p/w500/pB8BM79JsS0Zv9Uv00pYI0mhaZ5.jpg'

    TVDetailsResponse:
      type: object
      properties:
        id:
          type: integer
          example: 246
        title:
          type: string
          example: 'Avatar: The Last Airbender'
        genre:
          type: string
          example: 'Action & Adventure, Animation, Kids'
        year:
          type: string
          example: '2005'
        episodes:
          type: integer
          example: 61
        seasons:
          type: integer
          example: 3
        summary:
          type: string
          example: 'In a war-torn world of elemental magic, a young boy reawakens to undertake a dangerous mystic quest to fulfill his destiny as the Avatar, and bring peace to the world.'
        poster_url:
          type: string
          nullable: true
          example: 'https://image.tmdb.org/t/p/w500/cZ0d3rtvX5s1bUu3Wej2p3m2g2Y.jpg'

    TMDBErrorResponse:
      type: object
      properties:
        status_message:
          type: string
          example: 'The resource you requested could not be found.'

    TVSearchResponse:
      type: object
      properties:
        page:
          type: integer
          example: 1
        totalPages:
          type: integer
          example: 1
        totalResults:
          type: integer
          example: 10
        results:
          type: array
          items:
            $ref: '#/components/schemas/TVSearchResult'

    TVSearchResult:
      type: object
      properties:
        id:
          type: integer
          example: 1396
        name:
          type: string
          example: Breaking Bad
        originalName:
          type: string
          example: Breaking Bad
        overview:
          type: string
          example: A chemistry teacher starts a new life.
        firstAirDate:
          type: string
          example: '2008-01-20'
        genreIds:
          type: array
          items:
            type: integer
          example: [18, 80]
        popularity:
          type: number
          example: 100.5
        voteAverage:
          type: number
          example: 8.9
        voteCount:
          type: integer
          example: 1000
        originalLanguage:
          type: string
          example: en
        posterPath:
          type: string
          nullable: true
          example: /poster.jpg
        posterUrl:
          type: string
          nullable: true
          example: https://image.tmdb.org/t/p/w500/poster.jpg
        backdropPath:
          type: string
          nullable: true
          example: /backdrop.jpg
        backdropUrl:
          type: string
          nullable: true
          example: https://image.tmdb.org/t/p/w500/backdrop.jpg

    MovieSearchResponse:
      type: object
      properties:
        page:
          type: integer
          example: 1
        totalPages:
          type: integer
          example: 1
        totalResults:
          type: integer
          example: 10
        results:
          type: array
          items:
            $ref: '#/components/schemas/MovieSearchResult'

    MovieSearchResult:
      type: object
      properties:
        id:
          type: integer
          example: 27205
        title:
          type: string
          example: Inception
        originalTitle:
          type: string
          example: Inception
        overview:
          type: string
          example: A thief who steals corporate secrets through dream-sharing technology.
        releaseDate:
          type: string
          example: '2010-07-16'
        genreIds:
          type: array
          items:
            type: integer
          example: [28, 878]
        popularity:
          type: number
          example: 120
        voteAverage:
          type: number
          example: 8.4
        voteCount:
          type: integer
          example: 36000
        originalLanguage:
          type: string
          example: en
        posterPath:
          type: string
          nullable: true
          example: /poster.jpg
        posterUrl:
          type: string
          nullable: true
          example: https://image.tmdb.org/t/p/w500/poster.jpg
        backdropPath:
          type: string
          nullable: true
          example: /backdrop.jpg
        backdropUrl:
          type: string
          nullable: true
          example: https://image.tmdb.org/t/p/w500/backdrop.jpg

    NumericErrorResponse:
      type: object
      properties:
        error:
          type: integer
          example: 400
        message:
          type: string
          example: Missing required query parameter

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: 'Failed to reach TMDB service'

    PopularTVResponse:
      type: object
      properties:
        page:
          type: integer
          example: 1
        totalPages:
          type: integer
          example: 10
        totalResults:
          type: integer
          example: 200
        results:
          type: array
          items:
            $ref: '#/components/schemas/TVSummary'

    TVSummary:
      type: object
      properties:
        id:
          type: integer
          example: 1396
        name:
          type: string
          example: Breaking Bad
        overview:
          type: string
          example: A chemistry teacher starts a new life.
        firstAirDate:
          type: string
          example: '2008-01-20'
        posterUrl:
          type: string
          nullable: true
          example: https://image.tmdb.org/t/p/w500/poster.jpg
        voteAverage:
          type: number
          example: 8.9
        popularity:
          type: number
          example: 100.5

    PopularMoviesResponse:
      type: object
      properties:
        page:
          type: integer
          example: 1
        totalPages:
          type: integer
          example: 10
        totalResults:
          type: integer
          example: 200
        results:
          type: array
          items:
            $ref: '#/components/schemas/MovieSummary'

    MovieSummary:
      type: object
      properties:
        id:
          type: integer
          example: 27205
        title:
          type: string
          example: Inception
        overview:
          type: string
          example: A thief who steals corporate secrets.
        releaseDate:
          type: string
          example: '2010-07-16'
        posterUrl:
          type: string
          nullable: true
          example: https://image.tmdb.org/t/p/w500/poster.jpg
        voteAverage:
          type: number
          example: 8.8
        popularity:
          type: number
          example: 95.2

    RatingAuthor:
      type: object
      properties:
        id:
          type: integer
          example: 7
        display_name:
          type: string
          nullable: true
          example: Kassie

    Rating:
      type: object
      properties:
        id:
          type: integer
          example: 1
        authorId:
          type: integer
          example: 7
        rating:
          type: integer
          example: 4
        title_id:
          type: integer
          example: 99
        author:
          $ref: '#/components/schemas/RatingAuthor'

    RatingResponse:
