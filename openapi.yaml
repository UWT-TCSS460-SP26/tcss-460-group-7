openapi: 3.0.3
info:
  title: TCSS 460 Group Project API
  description: |
    **Team:** Group 7
    **Deployed URL:** https://tcss-460-group-7.onrender.com

    A RESTful API for the TCSS 460 group project.
  version: 0.1.0

servers:
  - url: http://localhost:3500
    description: Local development
  - url: https://tcss-460-group-7.onrender.com
    description: cloud development

tags:
  - name: General
    description: General-purpose routes
  - name: Users
    description: User management routes
  - name: TV Search
    description: TMDB TV search proxy routes
  - name: Movie Search
    description: TMDB movie search proxy routes
  - name: Popular
    description: Popular movies and TV shows
  - name: Movies Details
    description: Movie related routes
  - name: TV Shows Details
    description: TV Show related routes
  - name: Ratings
    description: Authenticated user rating routes
  - name: Reviews
    description: Review management routes
  - name: Issues
    description: Bug reporting and issue tracking
  - name: Front End API
    description: Aggregated frontend-facing media routes

paths:
  /health:
    get:
      tags: [General]
      summary: Check status
      description: Checks the status of the server to ensure nothing was broken
      responses:
        '200':
          description: Checks the client status
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Status: OK'

  /v1/users:
    post:
      tags: [Users]
      summary: Create or sync the authenticated user
      description: Creates a user profile for the authenticated token subject, or updates the existing profile for that subject. `subjectId` is derived from the bearer token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User profile created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '200':
          description: Existing user profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error while creating the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Users]
      summary: Get all users (admin only)
      description: Returns a paginated, filterable list of all users. Requires admin role.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Results per page
        - in: query
          name: username
          schema:
            type: string
          description: Filter by partial username match (case-insensitive)
        - in: query
          name: email
          schema:
            type: string
          description: Filter by partial email match (case-insensitive)
        - in: query
          name: role
          schema:
            type: integer
            enum: [1, 2]
          description: Filter by role (1 = admin, 2 = user)
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsersResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error while fetching users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/users/{id}:
    get:
      tags: [Users]
      summary: Get a user by id
      description: Returns a single user by their id. Public, no auth required.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: User id
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error while fetching the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Users]
      summary: Update display_name
      description: Updates a user's display_name. Users can only update their own account.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: User id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid id or missing display_name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Cannot update another user's account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error while updating the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Users]
      summary: Delete a user
      description: Deletes a user. Users can delete their own account; admins can delete anyone.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: User id
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User deleted
        '400':
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Cannot delete another user's account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error while deleting the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tv/search/title:
    get:
      tags: [TV Search]
      summary: Search TV shows by title
      description: Searches TMDB for TV shows by title and returns key metadata with poster and backdrop image URLs.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: TV show title to search for.
          example: breaking bad
      responses:
        '200':
          description: TV search results returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TVSearchResponse'
        '400':
          description: Missing or invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        default:
          description: Upstream TMDB request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        '500':
          description: TMDB API token is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/movie/search/title:
    get:
      tags: [Movie Search]
      summary: Search movies by title
      description: Searches TMDB for movies by title and returns key metadata with poster and backdrop image URLs.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Movie title to search for.
          example: inception
      responses:
        '200':
          description: Movie search results returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieSearchResponse'
        '400':
          description: Missing or invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        '401':
          description: TMDB request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        default:
          description: Upstream TMDB request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        '500':
          description: TMDB API token is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tv/search/genre:
    get:
      tags: [TV Search]
      summary: Search TV shows by genre
      description: Discovers TMDB TV shows by genre and returns key metadata with poster and backdrop image URLs.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: TV genre name. Spaces are normalized to underscores.
          example: drama
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: TMDB result page number.
      responses:
        '200':
          description: TV genre search results returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TVSearchResponse'
        '400':
          description: Invalid genre or page parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        '404':
          description: Genre was not found in the local TV genre map
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        default:
          description: Upstream TMDB request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        '500':
          description: TMDB API token is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tv/search/cast:
    get:
      tags: [TV Search]
      summary: Search TV shows by cast member
      description: Searches TMDB for a person, retrieves that person's TV credits, and optionally filters the credits by TV genre.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Cast member name.
          example: tom hanks
        - in: query
          name: genre
          required: false
          schema:
            type: string
          description: Optional TV genre name used to filter the cast member's TV credits.
          example: drama
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Local result page number for the cast member's TV credits.
      responses:
        '200':
          description: Cast TV credit results returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TVSearchResponse'
        '400':
          description: Invalid cast, genre, or page parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        '404':
          description: Cast member or genre was not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        default:
          description: Upstream TMDB request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        '500':
          description: TMDB API token is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tv/popular:
    get:
      tags: [Popular]
      summary: Get popular TV shows
      description: Returns a paginated list of currently popular TV shows from TMDB with key metadata and poster URLs.
      parameters:
        - in: query
          name: language
          required: false
          schema:
            type: string
            default: en-US
          description: Language for the results (IETF BCP 47 tag).
          example: en-US
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number of results.
        - in: query
          name: include_adult
          required: false
          schema:
            type: boolean
            default: false
          description: Include adult content in results.
      responses:
        '200':
          description: Popular TV shows returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PopularTVResponse'
        default:
          description: Upstream TMDB request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        '500':
          description: TMDB API token is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/movies/popular:
    get:
      tags: [Popular]
      summary: Get popular movies
      description: Returns a paginated list of currently popular movies from TMDB with key metadata and poster URLs.
      parameters:
        - in: query
          name: language
          required: false
          schema:
            type: string
            default: en-US
          description: Language for the results (IETF BCP 47 tag).
          example: en-US
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number of results.
        - in: query
          name: region
          required: false
          schema:
            type: string
          description: ISO 3166-1 country code to filter results by region.
          example: US
      responses:
        '200':
          description: Popular movies returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PopularMoviesResponse'
        default:
          description: Upstream TMDB request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
        '500':
          description: TMDB API token is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/movie/{id}:
    get:
      tags: [Movies Details]
      summary: Get movie details
      description: Fetches and transforms movie details from TMDB using a movie ID.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: The TMDB ID of the movie
      responses:
        '200':
          description: Successful response with transformed movie details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 550
                  title:
                    type: string
                    example: 'Fight Club'
                  genre:
                    type: string
                    example: 'Drama'
                  year:
                    type: string
                    example: '1999'
                  summary:
                    type: string
                    example: 'A ticking-time-bomb insomniac and a slippery soap salesman...'
                  poster_url:
                    type: string
                    nullable: true
                    example: 'https://image.tmdb.org/t/p/w500/pB8BM79JsS0Zv9Uv00pYI0mhaZ5.jpg'
                $ref: '#/components/schemas/MovieDetailsResponse'
        '404':
          description: Movie not found on TMDB
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_message:
                    type: string
                    example: 'The resource you requested could not be found.'
                $ref: '#/components/schemas/TMDBErrorResponse'
        default:
          description: Upstream TMDB request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TMDBErrorResponse'
        '502':
          description: Failed to reach TMDB
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Failed to reach TMDB'
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tv/{id}:
    get:
      tags: [TV Shows Details]
      summary: Get TV show details
      description: Fetches and transforms TV show details from TMDB using a TV show ID.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: The TMDB ID of the TV show
      responses:
        '200':
          description: Successful response with transformed TV show details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 246
                  title:
                    type: string
                    example: 'Avatar: The Last Airbender'
                  genre:
                    type: string
                    example: 'Action & Adventure, Animation, Kids'
                  year:
                    type: string
                    example: '2005'
                  episodes:
                    type: integer
                    example: 61
                  seasons:
                    type: integer
                    example: 3
                  summary:
                    type: string
                    example: 'In a war-torn world of elemental magic, a young boy reawakens to undertake a dangerous mystic quest to fulfill his destiny as the Avatar, and bring peace to the world.'
                  poster_url:
                    type: string
                    nullable: true
                    example: 'https://image.tmdb.org/t/p/w500/cZ0d3rtvX5s1bUu3Wej2p3m2g2Y.jpg'
                $ref: '#/components/schemas/TVDetailsResponse'
        '404':
          description: TV show not found on TMDB
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_message:
                    type: string
                    example: 'The resource you requested could not be found.'
                $ref: '#/components/schemas/TMDBErrorResponse'
        default:
          description: Upstream TMDB request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TMDBErrorResponse'
        '502':
          description: Failed to reach TMDB
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Failed to reach TMDB'
                $ref: '#/components/schemas/ErrorResponse'

  /v1/media/{mediaType}/{id}:
    get:
      tags: [Front End API]
      summary: Get enriched media details with community sentiment
      description: "Use `mediaType` as `movie` or `tv` and `id` as the TMDB title ID. Get the ID from the movie or TV search results, then call this endpoint for that selected title's metadata and reviews."
      parameters:
        - in: path
          name: mediaType
          required: true
          schema:
            type: string
            enum: [movie, tv]
          description: "The selected title type: `movie` or `tv`"
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: The TMDB ID from the selected search result
      responses:
        '200':
          description: Enriched media response with metadata, aggregate sentiment, and recent reviews
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrichedMediaResponse'
        '400':
          description: Invalid media type or title ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Title not found on TMDB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TMDBErrorResponse'
        default:
          description: Upstream TMDB request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TMDBErrorResponse'
        '502':
          description: Failed to build the enriched response or reach TMDB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/ratings/{title_id}:
    post:
      tags: [Ratings]
      summary: Create or replace the authenticated user's rating for a title
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: title_id
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingWriteRequest'
      responses:
        '201':
          description: Rating created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingResponse'
        '200':
          description: Existing rating updated instead of created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingResponse'
        '400':
          description: Invalid path or body input
        '500':
          description: Server error while creating or updating the rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Ratings]
      summary: Update the authenticated user's rating for a title
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: title_id
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingWriteRequest'
      responses:
        '200':
          description: Rating updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingResponse'
        '400':
          description: Invalid path or body input
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Rating not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error while updating the rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Ratings]
      summary: Delete the authenticated user's rating for a title
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: title_id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Rating deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingResponse'
        '400':
          description: Invalid path input
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Rating not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error while deleting the rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/reviews:
    post:
      tags: [Reviews]
      summary: Create a review
      description: Creates a new review for a title. Requires authentication.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Review created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
        '409':
          description: User has already reviewed this title
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags: [Reviews]
      summary: Get all reviews (admin only)
      description: Returns a paginated list of all reviews. Requires admin role.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 25
            maximum: 100
          description: Results per page
        - in: query
          name: sort
          schema:
            type: string
            default: createdAt
          description: Field to sort by
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort order
        - in: query
          name: id
          schema:
            type: integer
