                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The bearer token is missing, invalid, or expired.'
        '500':
          description: The server could not submit the bug report because of an unexpected internal error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The server could not submit the bug report.'

  /v1/reviews/{id}/remove-downvote:
    post:
      tags: [Reviews]
      summary: Remove a downvote
      description: Removes a previously counted downvote from a review. Use this when a signed-in user undoes a not-helpful vote.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Review id
      responses:
        '200':
          description: Downvote removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          description: The review ID is invalid, or the downvote count cannot be reduced below zero.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The downvote count is already zero, so there is no downvote to remove.'
        '401':
          description: The request did not include a valid bearer token for the user removing the downvote.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The bearer token is missing, invalid, or expired.'
        '404':
          description: No review exists for the requested ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'No review was found for the provided ID.'
        '500':
          description: The server could not remove the downvote because of an unexpected internal error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The server could not remove the downvote.'

