          items:
            $ref: '#/components/schemas/Rating'

    RatingsPagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 10
        totalRatings:
          type: integer
          example: 12
        totalPages:
          type: integer
          example: 2

    PaginatedRatingListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Rating'
        pagination:
          $ref: '#/components/schemas/RatingsPagination'

    CreateReviewRequest:
      type: object
      required: [title_id, content]
      properties:
        title_id:
          type: integer
          example: 246
        content:
          type: string
          example: 'This is a fantastic show with great character development!'
        header:
          type: string
          example: 'Masterpiece'

    UpdateReviewRequest:
      type: object
      properties:
        content:
          type: string
          example: "I changed my mind, it's actually just okay."
        header:
          type: string
          example: 'Just okay'

    PaginatedReviewsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Review'
        pagination:
          type: object
          properties:
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 25
            total:
              type: integer
              example: 12
            totalPages:
              type: integer
              example: 1

    RatingWriteRequest:
      type: object
      required:
        - rating
      properties:
        rating:
          type: integer
          example: 4

    Issue:
      type: object
      properties:
        id:
          type: integer
          example: 1
        authorId:
          type: integer
          nullable: true
          example: 7
        content:
          type: string
          example: 'The search bar is overlapping with the header on mobile.'
        createdAt:
          type: string
          format: date-time
          example: '2026-05-01T12:00:00.000Z'

    CreateIssueRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          example: 'The search bar is overlapping with the header on mobile.'
