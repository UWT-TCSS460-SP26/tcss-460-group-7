components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Access token issued by the configured OAuth2/Auth0 issuer and sent as `Authorization: Bearer <token>`."

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        subjectId:
          type: string
          example: auth0|123
        username:
          type: string
          example: stardust42
        email:
          type: string
          example: stardust42@dev.local
        display_name:
          type: string
          nullable: true
          example: Stardust
        role:
          type: integer
          example: 2
          description: 1 = admin, 2 = user

    CreateUserRequest:
      type: object
      required: [username, email]
      properties:
        username:
          type: string
          example: stardust42
        email:
          type: string
          example: stardust42@dev.local
        display_name:
          type: string
          nullable: true
          example: Stardust

    UpdateUserRequest:
      type: object
      required: [display_name]
      properties:
        display_name:
          type: string
          example: My New Name

    PaginatedUsersResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 42
        totalPages:
          type: integer
          example: 3
    MovieDetailsResponse:
      type: object
      properties:
        id:
          type: integer
          example: 550
        title:
          type: string
          example: 'Fight Club'
        genre:
          type: string
          example: 'Drama'
        year:
          type: string
          example: '1999'
        summary:
          type: string
          example: 'A ticking-time-bomb insomniac and a slippery soap salesman...'
        poster_url:
          type: string
          nullable: true
          example: 'https://image.tmdb.org/t/p/w500/pB8BM79JsS0Zv9Uv00pYI0mhaZ5.jpg'

    TVDetailsResponse:
