openapi: 3.0.3
info:
  title: Group 7's API
  description: |
    **Team:** Group 7
    **Deployed URL:** https://tcss-460-group-7.onrender.com

    A RESTful API for the TCSS 460 group project.
  version: 0.1.0

servers:
  - url: https://tcss-460-group-7.onrender.com
    description: Render deployment
  - url: http://localhost:3500
    description: Local development

tags:
  - name: Health
    description: Service health and status route
  - name: Users
    description: User management routes
  - name: TV
    description: TV discovery, search, popularity, and detail routes
  - name: Movies
    description: Movie discovery, search, popularity, and detail routes
  - name: Ratings
    description: Authenticated user rating routes
  - name: Reviews
    description: Review management routes
  - name: Issues
    description: Bug reporting and issue tracking
  - name: Front End API
    description: Aggregated frontend-facing media routes

paths:
  /health:
    get:
      tags: [Health]
      summary: Check status
      description: Returns a simple health response to confirm the API is running. Use this for uptime checks, deployment verification, or quick connectivity tests.
      responses:
        '200':
          description: Checks the client status
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Status: OK'

  /v1/users:
    post:
      tags: [Users]
      summary: Create or sync the authenticated user
      description: Creates the signed-in user's profile if it does not exist, or syncs profile fields if it already does. Use this right after authentication so your app has a local user record tied to the bearer token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User profile created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '200':
          description: Existing user profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: The request body is missing required user fields or contains invalid values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The request body must include a non-empty string for "username".'
        '401':
          description: The request did not include a valid bearer token, so the user could not be identified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The bearer token is missing, invalid, or expired.'
        '409':
          description: The requested username or email is already in use by another account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The requested username or email is already associated with another user.'
        '500':
          description: The server could not create or sync the user profile because of an unexpected internal error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The server could not create or sync the user profile.'

    get:
      tags: [Users]
      summary: Get all users (admin only)
      description: Returns a paginated list of users with optional filters. Use this for admin dashboards, moderation tools, or user management workflows.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Results per page
        - in: query
          name: username
          schema:
            type: string
          description: Filter by partial username match (case-insensitive)
        - in: query
          name: email
          schema:
            type: string
          description: Filter by partial email match (case-insensitive)
        - in: query
          name: role
          schema:
            type: integer
            enum: [1, 2]
          description: Filter by role (1 = admin, 2 = user)
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsersResponse'
        '401':
          description: The request did not include a valid bearer token for an authenticated admin user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The bearer token is missing, invalid, or expired.'
        '403':
          description: The authenticated user is not allowed to view the full user list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The authenticated user does not have permission to access this resource.'
        '500':
          description: The server could not retrieve the user list because of an unexpected internal error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The server encountered an unexpected error while processing the request.'

  /v1/users/{id}:
    get:
      tags: [Users]
      summary: Get a user by id
      description: Returns one user's public profile data by ID. Use this when you need to display author or account details tied to another resource.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: User id
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: The supplied user ID is invalid or is not a positive integer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The user ID in the path must be a positive integer.'
        '404':
          description: No user record exists for the requested ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'No user was found for the provided ID.'
        '500':
          description: The server could not retrieve the user because of an unexpected internal error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The server encountered an unexpected error while processing the request.'

    put:
      tags: [Users]
      summary: Update display_name
      description: Updates the display name for a user account. Use this from profile settings when a signed-in user wants to change how their name appears in the app.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: User id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: The supplied user ID is invalid, or the request body is missing a valid `display_name`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The request body must include a non-empty string for "display_name".'
        '401':
          description: The request did not include a valid bearer token for the user being updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The bearer token is missing, invalid, or expired.'
        '403':
          description: The authenticated user is not allowed to update this account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'You are only allowed to update your own user account.'
        '404':
          description: No user record exists for the requested ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'No user was found for the provided ID.'
        '500':
          description: The server could not update the user because of an unexpected internal error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The server could not update the user profile.'

    delete:
      tags: [Users]
      summary: Delete a user
      description: Deletes a user account. Use this for self-service account removal or admin account cleanup.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: User id
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User deleted
        '400':
          description: The supplied user ID is invalid or is not a positive integer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The user ID in the path must be a positive integer.'
        '401':
          description: The request did not include a valid bearer token for the user being deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The bearer token is missing, invalid, or expired.'
        '403':
          description: The authenticated user is not allowed to delete this account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'You are only allowed to delete your own user account unless you are an admin.'
        '404':
          description: No user record exists for the requested ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'No user was found for the provided ID.'
        '500':
          description: The server could not delete the user because of an unexpected internal error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The server could not delete the user account.'

  /v1/tv/search/title:
    get:
      tags: [TV]
      summary: Search TV shows by title
      description: Searches TV shows by title through TMDB and returns app-friendly result data. Use this when a user types a show name into search.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: TV show title to search for.
          example: breaking bad
      responses:
        '200':
          description: TV search results returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TVSearchResponse'
        '400':
          description: The required `q` query parameter is missing, empty, or invalid for a TV title search.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
              example:
                error: 400
                message: 'The required query parameter "q" must be a non-empty TV show title.'
        default:
          description: TMDB returned an unexpected error while processing the TV title search request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
              example:
                error: 503
                message: 'TMDB could not complete the TV title search request.'
        '500':
          description: The server is missing the TMDB API token needed to perform TV title searches.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The server is missing required configuration for TMDB_API_TOKEN.'

  /v1/movie/search/title:
    get:
      tags: [Movies]
      summary: Search movies by title
      description: Searches movies by title through TMDB and returns app-friendly result data. Use this when a user types a movie name into search.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Movie title to search for.
          example: inception
      responses:
        '200':
          description: Movie search results returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieSearchResponse'
        '400':
          description: The required `q` query parameter is missing, empty, or invalid for a movie title search.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
              example:
                error: 400
                message: 'The required query parameter "q" must be a non-empty movie title.'
        '401':
          description: TMDB rejected the upstream movie search request, usually because the upstream credentials were invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
              example:
                error: 401
                message: 'TMDB could not complete the movie title search request.'
        default:
          description: TMDB returned an unexpected error while processing the movie title search request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
              example:
                error: 503
                message: 'TMDB could not complete the movie title search request.'
        '500':
          description: The server is missing the TMDB API token needed to perform movie title searches.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The server is missing required configuration for TMDB_API_TOKEN.'

  /v1/tv/search/genre:
    get:
      tags: [TV]
      summary: Search TV shows by genre
      description: Finds TV shows that match a genre and returns browseable result data. Use this for category pages, filters, or genre-based discovery.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: TV genre name. Spaces are normalized to underscores.
          example: drama
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: TMDB result page number.
      responses:
        '200':
          description: TV genre search results returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TVSearchResponse'
        '400':
          description: The genre name, page number, or another query value is invalid for a TV genre search.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
              example:
                error: 400
                message: 'The query parameter "page" must be a positive integer.'
        '404':
          description: The provided TV genre name does not match any supported genre in the local genre map.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
              example:
                error: 404
                message: 'The provided TV genre could not be matched to a supported genre.'
        default:
          description: TMDB returned an unexpected error while processing the TV genre search request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
              example:
                error: 503
                message: 'TMDB could not complete the TV genre search request.'
        '500':
          description: The server is missing the TMDB API token needed to perform TV genre searches.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The server is missing required configuration for TMDB_API_TOKEN.'

  /v1/tv/search/cast:
    get:
      tags: [TV]
      summary: Search TV shows by cast member
      description: Finds TV shows associated with a cast member and can narrow them by genre. Use this for actor-based discovery or “more from this cast member” features.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Cast member name.
          example: tom hanks
        - in: query
          name: genre
          required: false
          schema:
            type: string
          description: Optional TV genre name used to filter the cast member's TV credits.
          example: drama
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Local result page number for the cast member's TV credits.
      responses:
        '200':
          description: Cast TV credit results returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TVSearchResponse'
        '400':
          description: The cast name, optional genre, or page number is invalid for a TV cast search.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
              example:
                error: 400
                message: 'The required query parameter "q" must be a non-empty cast member name.'
        '404':
          description: The requested cast member could not be found, or the provided genre filter was not recognized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
              example:
                error: 404
                message: 'No cast member was found for the provided search term.'
        default:
          description: TMDB returned an unexpected error while processing the TV cast search request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
              example:
                error: 503
                message: 'TMDB could not retrieve TV credits for the requested cast member.'
        '500':
          description: The server is missing the TMDB API token needed to perform TV cast searches.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The server is missing required configuration for TMDB_API_TOKEN.'

  /v1/tv/popular:
    get:
      tags: [TV]
      summary: Get popular TV shows
      description: Returns a paginated list of trending TV shows from TMDB. Use this for home pages, featured carousels, or default browse screens.
      parameters:
        - in: query
          name: language
          required: false
          schema:
            type: string
            default: en-US
          description: Language for the results (IETF BCP 47 tag).
          example: en-US
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number of results.
        - in: query
          name: include_adult
          required: false
          schema:
            type: boolean
            default: false
          description: Include adult content in results.
      responses:
        '200':
          description: Popular TV shows returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PopularTVResponse'
        default:
          description: TMDB returned an unexpected error while fetching the list of popular TV shows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
              example:
                error: 503
                message: 'TMDB could not retrieve the list of popular TV shows.'
        '500':
          description: The server is missing the TMDB API token needed to fetch popular TV shows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The server is missing required configuration for TMDB_API_TOKEN.'

  /v1/movies/popular:
    get:
      tags: [Movies]
      summary: Get popular movies
      description: Returns a paginated list of trending movies from TMDB. Use this for home pages, featured carousels, or default browse screens.
      parameters:
        - in: query
          name: language
          required: false
          schema:
            type: string
            default: en-US
          description: Language for the results (IETF BCP 47 tag).
          example: en-US
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number of results.
        - in: query
          name: region
          required: false
          schema:
            type: string
          description: ISO 3166-1 country code to filter results by region.
          example: US
      responses:
        '200':
          description: Popular movies returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PopularMoviesResponse'
        default:
          description: TMDB returned an unexpected error while fetching the list of popular movies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumericErrorResponse'
              example:
                error: 503
                message: 'TMDB could not retrieve the list of popular movies.'
        '500':
          description: The server is missing the TMDB API token needed to fetch popular movies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The server is missing required configuration for TMDB_API_TOKEN.'
  /v1/movie/{id}:
    get:
      tags: [Movies]
      summary: Get movie details
      description: Returns detailed information for one movie by TMDB ID. Use this after a user selects a movie from search or browsing results.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: The TMDB ID of the movie
      responses:
        '200':
          description: Successful response with transformed movie details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 550
                  title:
                    type: string
                    example: 'Fight Club'
                  genre:
                    type: string
                    example: 'Drama'
                  year:
                    type: string
                    example: '1999'
                  summary:
                    type: string
                    example: 'A ticking-time-bomb insomniac and a slippery soap salesman...'
                  poster_url:
                    type: string
                    nullable: true
                    example: 'https://image.tmdb.org/t/p/w500/pB8BM79JsS0Zv9Uv00pYI0mhaZ5.jpg'
                $ref: '#/components/schemas/MovieDetailsResponse'
        '400':
          description: The path parameter `id` is missing or does not contain a valid TMDB movie ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The path parameter "id" is required and must contain a TMDB movie ID.'
        '404':
          description: TMDB could not find a movie with the requested ID.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_message:
                    type: string
                    example: 'The resource you requested could not be found.'
                $ref: '#/components/schemas/TMDBErrorResponse'
        default:
          description: TMDB returned an unexpected error while fetching movie details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TMDBErrorResponse'
        '502':
          description: The API could not reach TMDB or could not translate the upstream response into the expected movie detail format.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'The API could not reach TMDB while fetching movie details.'
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tv/{id}:
    get:
      tags: [TV]
      summary: Get TV show details
      description: Returns detailed information for one TV show by TMDB ID. Use this after a user selects a show from search or browsing results.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: The TMDB ID of the TV show
      responses:
        '200':
          description: Successful response with transformed TV show details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 246
                  title:
                    type: string
                    example: 'Avatar: The Last Airbender'
                  genre:
                    type: string
                    example: 'Action & Adventure, Animation, Kids'
                  year:
                    type: string
                    example: '2005'
                  episodes:
                    type: integer
                    example: 61
                  seasons:
                    type: integer
                    example: 3
                  summary:
                    type: string
                    example: 'In a war-torn world of elemental magic, a young boy reawakens to undertake a dangerous mystic quest to fulfill his destiny as the Avatar, and bring peace to the world.'
                  poster_url:
                    type: string
                    nullable: true
                    example: 'https://image.tmdb.org/t/p/w500/cZ0d3rtvX5s1bUu3Wej2p3m2g2Y.jpg'
                $ref: '#/components/schemas/TVDetailsResponse'
        '400':
          description: The path parameter `id` is missing or does not contain a valid TMDB TV show ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'The path parameter "id" is required and must contain a TMDB TV show ID.'
        '404':
          description: TMDB could not find a TV show with the requested ID.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_message:
                    type: string
                    example: 'The resource you requested could not be found.'
                $ref: '#/components/schemas/TMDBErrorResponse'
        default:
          description: TMDB returned an unexpected error while fetching TV show details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TMDBErrorResponse'
        '502':
          description: The API could not reach TMDB or could not translate the upstream response into the expected TV detail format.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'The API could not reach TMDB while fetching TV show details.'
                $ref: '#/components/schemas/ErrorResponse'

  /v1/media/{mediaType}/{id}:
    get:
      tags: [Front End API]
      summary: Get enriched media details with community sentiment
      description: 'Returns a combined frontend-ready payload with TMDB metadata, aggregate sentiment, and recent community reviews. Use this for a detail page when you want both title data and app review context in one request.'
      parameters:
        - in: path
          name: mediaType
          required: true
          schema:
            type: string
            enum: [movie, tv]
          description: 'The selected title type: `movie` or `tv`'
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: The TMDB ID from the selected search result
      responses:
        '200':
          description: Enriched media response with metadata, aggregate sentiment, and recent reviews
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrichedMediaResponse'
        '400':
          description: The `mediaType` must be `movie` or `tv`, and the title ID must be a valid positive integer.
          content:
            application/json:
              schema:
